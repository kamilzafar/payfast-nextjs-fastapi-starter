<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Subscription Canceled</title></head>
<body style="font-family: Arial, sans-serif; color: #222; max-width: 600px; margin: 0 auto; padding: 24px;">
  <h1 style="font-size: 22px; font-weight: bold;">Subscription Canceled</h1>
  <p>Hi {{ user.name or user.email }},</p>
  <p>
    Your <strong>{{ plan.name }}</strong> subscription has been canceled due to non-payment.
  </p>
  <p>
    If you would like to reactivate your subscription, you can do so at any time from your account.
  </p>
  <hr style="border: none; border-top: 1px solid #ddd; margin: 24px 0;">
  <p style="font-size: 13px; color: #666;">
    If you believe this is an error, please contact our support team.
  </p>
</body>
</html>
