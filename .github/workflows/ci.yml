name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Backend env — JWT_SECRET must be set for settings to import cleanly.
  JWT_SECRET: ci-test-secret-not-for-production
  DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/payfast_test
  DATABASE_URL_TEST: postgresql+asyncpg://postgres:postgres@localhost:5432/payfast_test
  RATE_LIMIT_ENABLED: "false"
  SCHEDULER_ENABLED: "false"

jobs:
  # ---------------------------------------------------------------------------
  # Backend — pytest against a real Postgres service container
  # ---------------------------------------------------------------------------
  backend:
    name: backend (pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: payfast_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d payfast_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Set up Python
        run: uv python install 3.13

      - name: Install backend deps
        working-directory: backend
        run: uv sync --frozen

      - name: Run pytest
        working-directory: backend
        run: uv run pytest -v

  # ---------------------------------------------------------------------------
  # Frontend — build + lint + unit tests (no E2E by default)
  # ---------------------------------------------------------------------------
  frontend:
    name: frontend (build + lint + unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: frontend
        run: pnpm lint

      - name: Unit tests
        working-directory: frontend
        run: pnpm test

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: pnpm build

  # ---------------------------------------------------------------------------
  # E2E — only when PayFast UAT creds are available as repo secrets.
  # ---------------------------------------------------------------------------
  e2e:
    name: e2e (playwright, gated)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: ${{ secrets.PAYFAST_MERCHANT_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Build app
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: pnpm build

      # NOTE: for a real run you'd also spin up the backend + a Postgres service,
      # seed plans, and point the app at a PayFast UAT endpoint. Leaving this as
      # a stub — fill in once PAYFAST_MERCHANT_ID secret is wired in GitHub.
      - name: Run Playwright
        working-directory: frontend
        env:
          PAYFAST_MERCHANT_ID: ${{ secrets.PAYFAST_MERCHANT_ID }}
          PAYFAST_SECURED_KEY: ${{ secrets.PAYFAST_SECURED_KEY }}
          PAYFAST_BASE_URL: ${{ secrets.PAYFAST_BASE_URL }}
        run: pnpm e2e
